<!doctype html>
<html lang="en-KE">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Title & Description (Fallback for React Helmet) -->
    <title>Tajii – Buy Electronics Online | Phones, Laptops & Accessories</title>
    <meta
      name="description"
      content="Tajii is an online electronics store offering phones, laptops, accessories and gadgets at affordable prices with fast delivery."
    />
    <link rel="canonical" href="https://tajii.com/" />

    <!-- Search Engine Rules -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_KE" />
    <meta property="og:site_name" content="Tajii" />
    <meta property="og:title" content="Tajii – Buy Electronics Online" />
    <meta
      property="og:description"
      content="Shop phones, laptops and electronics online at Tajii. Quality gadgets, fair prices and secure checkout."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:alt" content="Tajii - Buy Electronics Online" />
    <meta property="og:url" content="https://tajii.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tajii – Online Electronics Store" />
    <meta
      name="twitter:description"
      content="Buy phones, laptops and accessories online with fast delivery."
    />
    <meta name="twitter:image" content="/og-image.svg" />
    <meta name="twitter:image:alt" content="Tajii - Buy Electronics Online" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Preconnect (Performance SEO boost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2BBMYXGF9N"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2BBMYXGF9N');
    </script>
  </head>

  <body>
    <noscript>
      Tajii requires JavaScript to run. Please enable JavaScript in your browser.
    </noscript>

    <div id="root"></div>

    <!-- App Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
